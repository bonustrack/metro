# Fly.io deployment for metro.
#
# ONE always-on machine + a single-attach volume. The volume can attach to only one
# machine, which ENFORCES XMTP's single-writer rule for free; disk-backed deploys
# replace the machine in place (the old one stops before the new starts), so there is
# never a moment with two writers on the same inbox.
#
# Change `app` to your own unique name (or run `fly launch` to generate one).

app = "metro"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  HOME = "/data"
  METRO_HTTP_HOST = "0.0.0.0"
  # Ephemeral (rebuilt at boot from the DB); lives in the image, not the volume.
  METRO_TRAINS_DIR = "/app/apps/mcp/trains"
  METRO_LOG_LEVEL = "info"
  # HOME=/data puts the durable state on the mounted volume:
  #   XMTP MLS db3s  → /data/.metro/xmtp-production-<id>.db3  (MUST persist)
  #   state dir      → /data/.cache/metro  (METRO_STATE_DIR default: lock, IPC)

# Secrets are NOT stored here — set them with `fly secrets set` (see README "Deploying"):
#   DATABASE_URL      (required — the Postgres holding agents/accounts/keys)
#   Optional: METRO_MCP_HTTP_TOKEN (else the single agent's first key is used),
#   METRO_PUBLIC_URL (attachment link base; unset → tunnel hostname), METRO_AGENT
#   (pin one agent by id). The channel allowlist is per-account in the DB config.
# Station secrets (mnemonic/keys/tokens/sessions) now live in the DB rows, NOT on Fly.

[http_service]
  internal_port = 8420
  force_https = true
  # ALWAYS-ON: metro holds XMTP streams + Telegram long-poll; never let Fly stop the
  # machine, and never run more than one (single-writer).
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "45s"

# The single-attach volume holds the durable XMTP MLS db3s (see [env] above). Losing
# it burns 1 of the inbox's 10 install slots, so it MUST stay mounted at /data.
[mounts]
  source = "metro_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"   # bump (2gb+) as you add XMTP accounts — each is a live client
