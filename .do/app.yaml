# DigitalOcean App Platform spec for Metro.
#
# Build: doctl apps create --spec .do/app.yaml   (or import in the DO console)
# Update: doctl apps update <app-id> --spec .do/app.yaml
#
# IMPORTANT — persistence & XMTP:
#   App Platform components have an EPHEMERAL filesystem (no attachable block volume).
#   With DATABASE_URL set, all account config lives in Postgres, so a Telegram/Discord
#   agent is fully stateless and runs here cleanly. XMTP is different: the XMTP SDK
#   keeps each inbox's MLS state in a LOCAL SQLite DB that MUST persist and MUST have
#   a single writer — losing it re-installs the inbox (burns the 10-install budget).
#   Do NOT run XMTP on App Platform. For an XMTP agent, deploy the same Docker image
#   to a DO Droplet with a DO Block Storage Volume mounted at /data (mirrors the Fly
#   single-machine + single-attach-volume setup). See README "Deploying to DigitalOcean".
#
# Secrets (DATABASE_URL, METRO_MCP_HTTP_TOKEN) are set as encrypted env vars — never
# commit their values. Set them in the DO console or with `doctl apps update`.

name: metro
region: nyc

services:
  - name: metro
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: bonustrack/metro
      branch: main
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xs
    http_port: 8420
    health_check:
      http_path: /health
      initial_delay_seconds: 45
      period_seconds: 30
      timeout_seconds: 5
    envs:
      - key: METRO_HTTP_HOST
        value: "0.0.0.0"
      - key: HOME
        value: /data
      - key: METRO_TRAINS_DIR
        value: /app/trains
      - key: METRO_LOG_LEVEL
        value: info
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: METRO_MCP_HTTP_TOKEN
        scope: RUN_TIME
        type: SECRET
      # Optional: pin this instance to one agent from the DB (name or id).
      # - key: METRO_AGENT
      #   value: Tony
